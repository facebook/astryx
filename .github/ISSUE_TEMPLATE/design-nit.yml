name: "🎨 Design Nit"
description: Report a visual bug or inconsistency found during design audit.
title: "[design-nit] "
labels: ["design-nit"]
body:
  - type: textarea
    id: description
    attributes:
      label: What's wrong
      description: Describe the issue — mention the component and what you see vs what you expect. Drop screenshots if you have them.
      placeholder: |
        Badge height should be 20px but it's currently 24.5px.
    validations:
      required: true
