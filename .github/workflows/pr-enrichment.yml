name: PR Enrichment

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-enrichment-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout base branch for comparison
        run: git fetch origin ${{ github.base_ref }}:base-branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Analyze components
        id: analyze
        run: |
          node .github/scripts/analyze-pr.js \
            --base base-branch \
            --head HEAD \
            --output analysis.json

      - name: Build Storybook
        run: yarn storybook:build

      - name: Deploy Storybook preview
        id: deploy
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEPLOY_PATH="pr/${PR_NUMBER}"
          PAGES_URL="https://facebookexperimental.github.io/xds/${DEPLOY_PATH}"

          # Save storybook build to temp
          mkdir -p /tmp/storybook-deploy
          cp -r apps/storybook/dist/* /tmp/storybook-deploy/

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if gh-pages exists on remote
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            # Branch exists, fetch and checkout
            git fetch origin gh-pages
            git checkout -B gh-pages origin/gh-pages
          else
            # Branch doesn't exist, create orphan
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo "# GitHub Pages" > README.md
          fi

          # Create PR directory and copy build
          mkdir -p "${DEPLOY_PATH}"
          rm -rf "${DEPLOY_PATH:?}"/*
          cp -r /tmp/storybook-deploy/* "${DEPLOY_PATH}/"

          # Add .nojekyll if not present
          touch .nojekyll

          # Commit and push
          git add .
          git commit -m "Deploy Storybook preview for PR #${PR_NUMBER}" || echo "No changes to commit"
          git push origin gh-pages

          # Switch back to PR branch
          git checkout -

          echo "pages_url=${PAGES_URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${PAGES_URL}"

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Capture component screenshots
        id: screenshots
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          PAGES_URL="${{ steps.deploy.outputs.pages_url }}"
          node .github/scripts/capture-screenshots.js \
            --storybook-dir apps/storybook/dist \
            --output-dir screenshots \
            --storybook-url "${PAGES_URL}" \
            --components "$COMPONENTS"

      - name: Run accessibility audit
        id: a11y
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          node .github/scripts/accessibility-audit.js \
            --storybook-dir apps/storybook/dist \
            --output a11y-report.json \
            --components "$COMPONENTS"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: component-screenshots
          path: screenshots/
          retention-days: 30

      - name: Generate PR comment
        id: comment
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAGES_URL="${{ steps.deploy.outputs.pages_url }}"
          COMMENT_BODY=$(node .github/scripts/generate-pr-comment.js \
            --analysis analysis.json \
            --a11y a11y-report.json \
            --screenshots screenshots/screenshots.json \
            --storybook-url "${PAGES_URL}" \
            --run-url "$RUN_URL")

          # Save to file for the next step
          echo "$COMMENT_BODY" > pr-comment.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');

            // Find and update existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Analysis Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
