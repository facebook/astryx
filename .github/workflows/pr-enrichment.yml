name: PR Enrichment

on:
  workflow_run:
    workflows: ["Deploy Storybook to Pages"]
    types:
      - completed

concurrency:
  group: pr-enrichment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze PR
    # Only run on successful storybook deployment for PRs
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Checkout base branch for comparison
        run: git fetch origin ${{ github.event.workflow_run.head_branch }}

      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });
            if (prs.data.length > 0) {
              core.setOutput('number', prs.data[0].number);
              core.setOutput('base_ref', prs.data[0].base.ref);
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Analyze components
        id: analyze
        run: |
          node .github/scripts/analyze-pr.js \
            --base origin/${{ steps.pr.outputs.base_ref }} \
            --head HEAD \
            --output analysis.json

      - name: Compute Storybook URL and artifact name
        id: storybook
        run: |
          COMMIT_HASH="${{ github.event.workflow_run.head_sha }}"
          SHORT_HASH="${COMMIT_HASH:0:7}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_OWNER="${{ github.repository_owner }}"
          STORYBOOK_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/${SHORT_HASH}/"
          echo "url=${STORYBOOK_URL}" >> $GITHUB_OUTPUT
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT

      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-${{ steps.storybook.outputs.short_hash }}
          path: apps/storybook/dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Install ffmpeg for video conversion
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Capture component screenshots and videos
        id: screenshots
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          node .github/scripts/capture-screenshots.js \
            --storybook-dir apps/storybook/dist \
            --output-dir screenshots \
            --components "$COMPONENTS" \
            --video

      - name: Upload screenshots and videos to GitHub
        id: upload_screenshots
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install CML CLI only (no visualization deps)
          npm install -g @dvcorg/cml

          # Upload each screenshot and video, collect URLs
          echo '{}' > screenshot-urls.json

          # Upload PNG screenshots
          for file in screenshots/*.png; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          # Upload GIF videos
          for file in screenshots/*.gif; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          # Upload MP4 videos
          for file in screenshots/*.mp4; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          cat screenshot-urls.json

      - name: Run accessibility audit
        id: a11y
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          node .github/scripts/accessibility-audit.js \
            --storybook-dir apps/storybook/dist \
            --output a11y-report.json \
            --components "$COMPONENTS"

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: component-screenshots
          path: screenshots/
          retention-days: 30

      - name: Generate PR comment
        id: comment
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          COMMENT_BODY=$(node .github/scripts/generate-pr-comment.js \
            --analysis analysis.json \
            --a11y a11y-report.json \
            --screenshots screenshots/screenshots.json \
            --screenshot-urls screenshot-urls.json \
            --storybook-url "${{ steps.storybook.outputs.url }}" \
            --run-url "$RUN_URL" \
            --pr-number "${{ steps.pr.outputs.number }}")

          # Save to file for the next step
          echo "$COMMENT_BODY" > pr-comment.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const prNumber = ${{ steps.pr.outputs.number }};

            // Find and update existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Analysis Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
