# Deploy Storybook to GitHub Pages with versioned builds
name: Deploy Storybook to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs on pull requests
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  actions: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  # Detect if any core components changed (lightweight, no install needed)
  # Runs in parallel with test so it's ready by the time deploy finishes
  check-components:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_components: ${{ steps.check.outputs.has_components }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for component changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/core/src/ | grep -v -E '(hooks|theme|utils)/' | head -1)
          echo "has_components=$( [ -n "$CHANGED" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  # Run tests first
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - run: yarn test

      - run: yarn build

  # Build, analyze, and deploy Storybook
  # Analysis runs here to reuse the existing install + build
  deploy:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      storybook_url: ${{ steps.urls.outputs.storybook_url }}
      short_hash: ${{ steps.urls.outputs.short_hash }}
      sandbox_url: ${{ steps.urls.outputs.sandbox_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build core package
        run: yarn build

      - name: Build Storybook
        run: yarn workspace @xds/storybook build

      - name: Build Sandbox
        run: yarn workspace @xds/sandbox build
        continue-on-error: true

      - name: Prepare versioned deployment
        id: urls
        run: |
          COMMIT_HASH="${{ github.event.pull_request.head.sha || github.sha }}"
          SHORT_HASH="${COMMIT_HASH:0:7}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_OWNER="${{ github.repository_owner }}"
          STORYBOOK_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/${SHORT_HASH}/"
          SANDBOX_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/${SHORT_HASH}/sandbox/"

          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT
          echo "storybook_url=${STORYBOOK_URL}" >> $GITHUB_OUTPUT
          echo "sandbox_url=${SANDBOX_URL}" >> $GITHUB_OUTPUT

          # Create deployment directory structure
          mkdir -p deploy/${SHORT_HASH}
          cp -r apps/storybook/dist/* deploy/${SHORT_HASH}/

          # Copy sandbox build if it exists
          if [ -d "apps/sandbox/dist" ]; then
            mkdir -p deploy/${SHORT_HASH}/sandbox
            cp -r apps/sandbox/dist/* deploy/${SHORT_HASH}/sandbox/
          fi

          # Create root index.html that redirects to latest build (only for main branch)
          if [ "${{ github.event_name }}" == "push" ]; then
            cat > deploy/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0;url=${SHORT_HASH}/index.html">
            <title>XDS Storybook</title>
          </head>
          <body>
            <p>Redirecting to <a href="${SHORT_HASH}/index.html">latest Storybook (${SHORT_HASH})</a>...</p>
          </body>
          </html>
          EOF
          fi

          # Create .nojekyll to prevent GitHub Pages from ignoring files starting with underscore
          touch deploy/.nojekyll

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-${{ steps.urls.outputs.short_hash }}
          path: apps/storybook/dist/
          retention-days: 30

      - name: Analyze components
        if: github.event_name == 'pull_request'
        run: |
          node .github/scripts/analyze-pr.js \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --output analysis.json

      - name: Upload analysis artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis
          path: analysis.json
          retention-days: 1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
          destination_dir: .

  # Screenshots - capture component screenshots and videos (runs in parallel with a11y)
  # Skipped entirely when no components changed. No yarn install needed — scripts use only Node builtins + Playwright.
  pr-screenshots:
    needs: [deploy, check-components]
    if: needs.check-components.outputs.has_components == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download analysis artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-analysis

      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-${{ needs.deploy.outputs.short_hash }}
          path: apps/storybook/dist

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Install ffmpeg for video conversion
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Capture component screenshots and videos
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          node .github/scripts/capture-screenshots.js \
            --storybook-dir apps/storybook/dist \
            --output-dir screenshots \
            --components "$COMPONENTS" \
            --video

      - name: Upload screenshots and videos to GitHub
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install CML CLI only (no visualization deps)
          npm install -g @dvcorg/cml

          # Upload each screenshot and video, collect URLs
          echo '{}' > screenshot-urls.json

          # Upload PNG screenshots
          for file in screenshots/*.png; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          # Upload GIF videos
          for file in screenshots/*.gif; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          # Upload MP4 videos
          for file in screenshots/*.mp4; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url=$(cml publish "$file")
              echo "Uploaded $filename -> $url"
              jq --arg name "$filename" --arg url "$url" \
                '. + {($name): $url}' screenshot-urls.json > tmp.json && mv tmp.json screenshot-urls.json
            fi
          done

          cat screenshot-urls.json

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: component-screenshots
          path: |
            screenshots/
            screenshot-urls.json
          retention-days: 30

  # Accessibility audit - runs in parallel with screenshots
  # Skipped entirely when no components changed. No yarn install needed.
  pr-a11y:
    needs: [deploy, check-components]
    if: needs.check-components.outputs.has_components == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download analysis artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-analysis

      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-${{ needs.deploy.outputs.short_hash }}
          path: apps/storybook/dist

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run accessibility audit
        run: |
          COMPONENTS=$(cat analysis.json | jq -r '(.newComponents + .modifiedComponents) | join(",")')
          node .github/scripts/accessibility-audit.js \
            --storybook-dir apps/storybook/dist \
            --output a11y-report.json \
            --components "$COMPONENTS"

      - name: Upload a11y artifact
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: a11y-report.json
          retention-days: 1

  # PR Comment - combine results and post comment
  # Runs even when screenshots/a11y are skipped (no components changed)
  pr-comment:
    needs: [deploy, check-components, pr-screenshots, pr-a11y]
    if: github.event_name == 'pull_request' && always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download analysis artifact
        if: needs.deploy.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pr-analysis

      - name: Download screenshots artifact
        if: needs.pr-screenshots.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: component-screenshots
          path: screenshots-artifact

      - name: Download a11y artifact
        if: needs.pr-a11y.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: a11y-report

      - name: Generate PR comment
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Use empty defaults when artifacts were skipped
          if [ ! -f analysis.json ]; then
            echo '{"newComponents":[],"modifiedComponents":[],"componentStats":{},"totalBundle":{}}' > analysis.json
          fi
          if [ ! -f a11y-report.json ]; then
            echo '{"components":{},"summary":{"componentsAudited":0,"totalViolations":0}}' > a11y-report.json
          fi

          SCREENSHOTS_ARG=""
          SCREENSHOT_URLS_ARG=""
          if [ -f screenshots-artifact/screenshots/screenshots.json ]; then
            SCREENSHOTS_ARG="--screenshots screenshots-artifact/screenshots/screenshots.json"
          fi
          if [ -f screenshots-artifact/screenshot-urls.json ]; then
            SCREENSHOT_URLS_ARG="--screenshot-urls screenshots-artifact/screenshot-urls.json"
          fi

          COMMENT_BODY=$(node .github/scripts/generate-pr-comment.js \
            --analysis analysis.json \
            --a11y a11y-report.json \
            $SCREENSHOTS_ARG \
            $SCREENSHOT_URLS_ARG \
            --storybook-url "${{ needs.deploy.outputs.storybook_url }}" \
            --sandbox-url "${{ needs.deploy.outputs.sandbox_url }}" \
            --run-url "$RUN_URL" \
            --pr-number "${{ github.event.pull_request.number }}")

          # Save to file for the next step
          echo "$COMMENT_BODY" > pr-comment.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const prNumber = ${{ github.event.pull_request.number }};

            // Find and update existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Analysis Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
