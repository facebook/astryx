name: JEDI Publish

# Publishes @jon4ohio/jedi-* to GitHub Packages (distribution names).
# Public package identity remains @jedi/* — consumers use npm aliases in package.json.
# See docs/PUBLIC_API.md

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish --dry-run only
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@jon4ohio"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build upstream Astryx deps for JEDI
        run: |
          pnpm -F @astryxdesign/core build
          pnpm -F @astryxdesign/theme-gothic build
          pnpm -F @astryxdesign/theme-neutral build

      - name: Build JEDI packages
        run: pnpm build:jedi

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in jedi-tokens jedi-themes jedi-core jedi-react; do
            echo "Publishing packages/${pkg}..."
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              (cd "packages/${pkg}" && npm publish --dry-run)
            else
              (cd "packages/${pkg}" && npm publish)
            fi
          done
