# Auto-clear the review gate after an approval — including on FORK PRs.
#
# The gate is set by review-signal's "flag" job (label needs:code-review +
# a pending "review-required" commit status). Clearing can't run on the raw
# pull_request_review event for fork PRs (read-only token → 403). So this runs
# on workflow_run after "Review signal" completes for a review submission, from
# the base repo with a write-capable token that works for forks.
#
# It clears DIRECTLY (no re-dispatch hop, which was unreliable): resolve the PR,
# check whether an entitled CODEOWNER has approved, and if so drop the
# needs:code-review label, set the review-required status to success, and
# neutralize any stale action_required "review-required" CHECK RUN left over
# from the pre-status gate (that stale check-run otherwise drags the status
# rollup to FAILURE even when the status is success).
#
# Clearing only ever REMOVES the code gate — an approval can satisfy a gate, not
# create one — so this needs no risk detection. It never checks out or runs
# PR-controlled code.

name: Review clear

on:
  workflow_run:
    workflows: ["Review signal"]
    types: [completed]

permissions: {}

jobs:
  clear:
    if: github.event.workflow_run.event == 'pull_request_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
      checks: write
      contents: read
    steps:
      # Read-only, sparse checkout of our default branch — only the owner files,
      # never PR-controlled code. Lets the entitled-approver read below hit the
      # local filesystem instead of the content API (which has returned
      # transient 502s on ref=main). This job runs on workflow_run, so the
      # default branch is our own trusted code.
      - name: Check out owner files (default branch, read-only)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/ENGOWNERS
            .github/CODEOWNERS
          sparse-checkout-cone-mode: false
          persist-credentials: false
      - name: Clear the code gate if an entitled owner approved
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const run = context.payload.workflow_run;
            const CODE = 'needs:code-review';

            // Resolve the PR the review belonged to.
            //
            // NOTE: for a workflow_run fired by a pull_request_target/
            // pull_request_review-triggered workflow, the payload's top-level
            // head_sha/head_branch point at the DEFAULT BRANCH (main), not the
            // PR — and pull_requests is empty for forks. So neither the SHA nor
            // the payload branch resolves the PR. The reliable signal is the
            // triggering run's own head_branch (correct even for forks); find
            // the open PR whose head branch matches.
            let prNumber = null;
            const prs0 = run.pull_requests || [];
            if (prs0.length) {
              prNumber = prs0[0].number;
            } else if (run.head_branch) {
              try {
                // head param wants OWNER:branch; head_repository is the fork/owner.
                const headOwner = (run.head_repository && run.head_repository.owner &&
                  run.head_repository.owner.login) || owner;
                const list = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: 'open',
                  head: `${headOwner}:${run.head_branch}`, per_page: 100,
                });
                let match = list[0];
                // Fallback: some fork setups don't match the head filter; scan by branch name.
                if (!match) {
                  const all = await github.paginate(github.rest.pulls.list, {
                    owner, repo, state: 'open', per_page: 100,
                  });
                  match = all.find((p) => p.head && p.head.ref === run.head_branch);
                }
                if (match) prNumber = match.number;
              } catch (e) {
                core.warning(`Could not resolve PR from branch ${run.head_branch}: ${e.message}`);
              }
            }
            if (!prNumber) { core.info('No PR resolved for this review run.'); return; }

            // Full PR (labels + head sha).
            const { data: full } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const headSha = full.head.sha;
            const labels = full.labels.map((l) => l.name);

            // Read the entitled code approvers: the CODEOWNERS `*` line plus
            // all ENGOWNERS. An approval from any of them clears the code gate
            // (eng owns the code; CODEOWNERS is a strict review-duty subset).
            // Prefer the local filesystem (the sparse default-branch checkout
            // above) since the content API has returned transient 502s on
            // ref=main; fall back to the API with retries. If a critical owner
            // file still can't be read, DON'T clear (leave the gate as-is) and
            // let review-signal's flag job reconcile on the next push/dispatch —
            // declining to clear is the safe direction here.
            const fs = require('fs');
            async function apiRead(path) {
              let lastErr;
              for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner, repo, path, ref: full.base.ref,
                  });
                  return Buffer.from(data.content, 'base64').toString('utf8');
                } catch (e) {
                  lastErr = e;
                  core.warning(`API read of ${path} failed (attempt ${attempt}/3): ${e.message}`);
                  if (attempt < 3) await new Promise((r) => setTimeout(r, 500 * attempt));
                }
              }
              throw new Error(`Could not read ${path} after 3 API attempts: ${lastErr && lastErr.message}`);
            }
            async function readOwnerFile(path) {
              try {
                return fs.readFileSync(path, 'utf8');
              } catch (e) {
                core.warning(`Local read of ${path} failed (${e.code || e.message}); falling back to API.`);
                return apiRead(path);
              }
            }
            function handlesFromText(text, { starLineOnly = false } = {}) {
              // Drop comment lines first so a header @handle isn't parsed as an
              // owner, then (for CODEOWNERS) keep only the `*` default line.
              const lines = text.split('\n').filter((l) => !l.trim().startsWith('#'));
              const src = starLineOnly
                ? (lines.map((l) => l.trim()).find((l) => l.startsWith('*')) || '')
                : lines.join('\n');
              return (src.match(/@[A-Za-z0-9-]+/g) || []).map((h) => h.slice(1).toLowerCase());
            }
            let codeApprovers;
            try {
              const [codeownersText, engownersText] = await Promise.all([
                readOwnerFile('.github/CODEOWNERS'),
                readOwnerFile('.github/ENGOWNERS'),
              ]);
              codeApprovers = new Set([
                ...handlesFromText(codeownersText, { starLineOnly: true }),
                ...handlesFromText(engownersText),
              ]);
            } catch (e) {
              core.warning(`Could not read owner files; not clearing (flag job will reconcile): ${e.message}`);
              return;
            }

            // Did an entitled owner approve (latest review state per user)?
            let codeApproved = false;
            try {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              const latest = new Map();
              for (const r of reviews) {
                if (!r.user || r.state === 'COMMENTED') continue;
                latest.set(r.user.login.toLowerCase(), r.state);
              }
              for (const [login, state] of latest) {
                if (state === 'APPROVED' && codeApprovers.has(login)) codeApproved = true;
              }
            } catch (e) {
              core.warning(`Could not read reviews: ${e.message}`);
            }

            if (!codeApproved) {
              core.info(`PR #${prNumber}: no entitled code owner (CODEOWNER/ENGOWNER) approval; leaving gate as-is.`);
              return;
            }

            // Clear: drop the label (ignore if already gone), set status success,
            // and neutralize any stale action_required review-required check run.
            if (labels.includes(CODE)) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: CODE });
                core.info(`Removed ${CODE} on #${prNumber}.`);
              } catch (e) {
                core.warning(`Could not remove ${CODE} (may already be gone): ${e.message}`);
              }
            }
            try {
              await github.rest.repos.createCommitStatus({
                owner, repo, sha: headSha, context: 'review-required',
                state: 'success', description: 'Cleared by code-owner approval.',
              });
              core.info(`review-required status → success on #${prNumber}.`);
            } catch (e) {
              core.warning(`Could not set review-required status: ${e.message}`);
            }
            // Neutralize stale check-run(s) of the same name so the rollup isn't
            // dragged to failure by a pre-status action_required leftover.
            try {
              const { data } = await github.rest.checks.listForRef({
                owner, repo, ref: headSha, check_name: 'review-required', per_page: 100,
              });
              for (const cr of data.check_runs) {
                if (cr.conclusion && cr.conclusion !== 'success' && cr.conclusion !== 'neutral') {
                  await github.rest.checks.update({
                    owner, repo, check_run_id: cr.id,
                    conclusion: 'neutral',
                    output: { title: 'Superseded by review-required status', summary: 'Cleared by code-owner approval; see the review-required status.' },
                  });
                  core.info(`Neutralized stale check-run ${cr.id} on #${prNumber}.`);
                }
              }
            } catch (e) {
              core.warning(`Could not neutralize stale check-run: ${e.message}`);
            }
