packages:
  - 'apps/*'
  # Example apps are standalone templates for the community to copy — they are
  # never built in-repo, so they stay out of the workspace and pin their own
  # dependency versions instead of using workspace protocols like catalog:.
  - '!apps/example-*'
  - 'packages/*'
  - 'packages/themes/*'
  - 'internal/*'

# Migrated from .npmrc: pnpm 11 reads these hoisting/linker settings from
# pnpm-workspace.yaml, not .npmrc. Keeps the flat, Yarn-1-style node_modules
# layout that build tools (and some phantom test imports) rely on.
nodeLinker: hoisted
shamefullyHoist: true
linkWorkspacePackages: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@astryxdesign/*'

# Single source of truth for the workspace's vite version: every consumer
# (root test config, packages/build) declares "vite": "catalog:", so a bump
# lands here once and cannot split the workspace across two vite majors.
# vite 8 requires @vitejs/plugin-react >= 5 (4.x peers stop at vite 7) —
# bump them together. The standalone example apps and the vibe-tests
# preview app pin their own vite; keep them on the same major by hand.
catalog:
  vite: ^8.1.3
  # StyleX toolchain: keeps runtime and babel plugin on the same minor across
  # every app/package that pins them (formerly a pnpm override). Peer ranges
  # in packages/* stay loose on purpose — they are consumer contracts, not
  # workspace pins.
  '@stylexjs/stylex': ^0.19.0
  '@stylexjs/babel-plugin': ^0.19.0
  # Workspace-wide tool pins (formerly pnpm overrides).
  prettier: ^3.9.3
  esbuild: ^0.28.1

# Moved from package.json's "pnpm" field: pnpm 11 no longer reads
# pnpm.overrides / pnpm.onlyBuiltDependencies from package.json.
#
# Every entry here is a LIVE security floor: it forces a transitive dep above
# a patched version that its dependent's own range does not reach. Each entry
# names the dependent pinning the vulnerable version and the condition under
# which the override can be deleted. To re-verify any of them: remove the
# line, run `pnpm install --lockfile-only`, then `pnpm audit`.
# Overrides whose floor the graph now reaches on its own get pruned — do not
# add version-alignment or dedup overrides here without a concrete need.
overrides:
  # next@15 pins postcss 8.4.31, below the <8.5.10 advisory patch line.
  # Drop on a Next upgrade that raises its postcss dependency.
  postcss: ^8.5.10
  # monaco-editor@0.55 pins dompurify 3.2.7 — 16 open advisories; the
  # strictest patch line is 3.4.11. Drop when monaco-editor catches up.
  dompurify: ^3.4.11
  # tsup@8.5 resolves esbuild 0.27.7, inside the 0.27.3–0.28.0 advisory
  # range. Drop when tsup raises its esbuild range past 0.28.1.
  esbuild: '>=0.28.1'

# pnpm 11 replaced the onlyBuiltDependencies allowlist with an allowBuilds map
# (managed via `pnpm approve-builds`). These are the same packages previously
# trusted to run install/build scripts under pnpm 10's onlyBuiltDependencies.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  puppeteer: true
  sharp: true
